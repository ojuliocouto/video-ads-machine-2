<!-- BLOCK: lower-third | params: {{start}}, {{dur}}, {{trackIndex}}, {{INITIAL}}, {{NAME}}, {{ROLE}} | gsap: entra x-60->0 fade, sai x-40 fade | z-index: 40 -->
<!--
  O que é: identificação do apresentador (avatar-letra + nome + cargo/marca), fixa no
  canto superior esquerdo, com fundo escuro translúcido e blur.

  Fonte: references/style.md (linhas 59-66) + _local/reelC-reference/index.html
  (CSS linhas 70-80, HTML linhas 162-168, GSAP linhas 248-250).

  Params:
    {{start}}      - data-start do clip #lt (no reelC original: 2.7)
    {{dur}}        - data-duration do clip #lt (no reelC original: 4.4)
    {{trackIndex}} - data-track-index (no reelC original: 40, igual ao z-index)
    {{INITIAL}}    - letra/inicial mostrada no avatar redondo (ex: "A" pra Ana)
    {{NAME}}       - nome do apresentador (ex: "Ana")
    {{ROLE}}       - cargo/marca (ex: "Sua Marca · I.A")

  GSAP (trecho a incluir na timeline principal; offsets relativos ao {{start}}/fim do clip,
  no reelC original eram absolutos 2.8 (entrada) e 6.75 (saída), calculados como
  {{start}}+0.1 e {{start}}+{{dur}}-0.05 aproximadamente; usar os valores reais que o
  build_timeline.py calcular, não uma fórmula fixa):
    gsap.set("#lt", { x: -60, opacity: 0 });
    tl.to("#lt", { x: 0, opacity: 1, duration: 0.55, ease: "power2.out" }, {{start}} + 0.1);
    tl.to("#lt", { opacity: 0, x: -40, duration: 0.4, ease: "power1.in" }, {{start}} + {{dur}} - 0.35);
-->
<style>
  #lt { position:absolute; left:60px; top:70px; z-index:40;
    display:flex; align-items:center; gap:20px;
    padding:18px 36px 18px 20px; border-radius:22px;
    background:rgba(12,13,20,.6); border:1px solid rgba(255,255,255,.14);
    box-shadow:0 20px 50px rgba(0,0,0,.45); backdrop-filter:blur(8px); }
  #lt .ava { width:70px; height:70px; border-radius:50%;
    background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.28); display:flex; align-items:center;
    justify-content:center; font-family:"Playfair Display", serif; font-style:italic; font-weight:600; font-size:38px; color:#fff; }
  #lt .name { font-family:"Inter"; font-weight:600; font-size:46px; color:#fff; line-height:1; letter-spacing:.2px; }
  #lt .role { font-family:"Inter"; font-weight:400; font-size:28px; color:rgba(255,255,255,.62); margin-top:8px; }
</style>

<div id="lt" class="clip" data-start="{{start}}" data-duration="{{dur}}" data-track-index="{{trackIndex}}">
  <div class="ava">{{INITIAL}}</div>
  <div>
    <div class="name">{{NAME}}</div>
    <div class="role">{{ROLE}}</div>
  </div>
</div>
